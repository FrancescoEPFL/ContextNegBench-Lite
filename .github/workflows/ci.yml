name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile source and scripts
        run: python -m compileall src scripts

      - name: Lint
        run: python -m ruff check src scripts tests

      - name: Format check
        run: python -m ruff format --check src scripts tests

      - name: Type check focused public utilities
        run: python -m mypy src/negcompbench/eval/schema_validation.py scripts/reproduce_paper_tables.py scripts/validate_result_schemas.py

      - name: Run unit tests
        run: python -m pytest -q

      - name: Validate public result schemas
        run: python scripts/validate_result_schemas.py

      - name: Run lightweight smoke test
        run: python scripts/smoke_test.py
